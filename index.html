<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web SQL Studio Pro</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="top-nav">
        <div class="nav-left">
            <button class="mobile-menu-btn" onclick="toggleSidebar()">
                <i class="ph ph-list"></i>
            </button>
            <div class="logo">
                <i class="ph-fill ph-database"></i>
                <span class="logo-text">Web SQL Studio Pro</span>
            </div>
            <button class="nav-btn" onclick="executeSQL()" title="Execute">
                <i class="ph-fill ph-play" style="color: var(--success-color);"></i> <span class="btn-text">Execute</span>
            </button>
            <button class="nav-btn" onclick="clearEditor()" title="Clear">
                <i class="ph ph-eraser"></i> <span class="btn-text">Clear</span>
            </button>
            <button class="nav-btn" onclick="resetDatabase()" title="Reset DB">
                <i class="ph ph-arrow-counter-clockwise" style="color: var(--danger-color);"></i> <span class="btn-text">Reset Server</span>
            </button>
        </div>
        <div class="nav-right">
            <button class="theme-toggle" onclick="cycleTheme()" id="theme-btn" title="Toggle Theme">
                <i class="ph ph-desktop"></i>
            </button>
        </div>
    </header>

    <main class="workspace">
        <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="ph ph-plugs-connected"></i> Object Explorer
                <button class="close-sidebar-btn" onclick="toggleSidebar()">
                    <i class="ph ph-x"></i>
                </button>
            </div>
            <div class="sidebar-content">
                <ul class="tree-view" id="db-tree">
                    <li>
                        <details open>
                            <summary><i class="ph-fill ph-hard-drives"></i> Local Server</summary>
                            <ul>
                                <li>
                                    <details open>
                                        <summary><i class="ph-fill ph-folder"></i> Databases</summary>
                                        <ul id="database-list"></ul>
                                    </details>
                                </li>
                            </ul>
                        </details>
                    </li>
                </ul>
            </div>
        </aside>

        <section class="editor-area">
            <div class="editor-container">
                <div class="editor-tabs">
                    <div class="tab active">Query.sql</div>
                </div>
                <textarea id="sql-input" spellcheck="false" placeholder="-- Welcome to Web SQL Studio Pro&#10;-- Try creating a database and some tables:&#10;CREATE DATABASE ShopDB;&#10;USE ShopDB;&#10;CREATE TABLE Users (ID INT, Username VARCHAR, Email VARCHAR);&#10;INSERT INTO Users VALUES (1, 'Admin', 'admin@shop.com');&#10;SELECT * FROM Users;"></textarea>
                
                <ul id="autocomplete-list" class="autocomplete-items"></ul>
            </div>

            <div class="results-container">
                <div class="results-tabs">
                    <div class="tab active" id="tab-messages" onclick="switchTab('messages')"><i class="ph ph-chat-text"></i> <span class="tab-text">Messages</span></div>
                    <div class="tab" id="tab-results" onclick="switchTab('results')"><i class="ph ph-table"></i> <span class="tab-text">Results</span></div>
                    <div class="tab" id="tab-diagram" onclick="switchTab('diagram')"><i class="ph ph-projector-screen-chart"></i> <span class="tab-text">Diagram</span></div>
                </div>
                <div class="results-content">
                    <pre id="output-console">Ready.</pre>
                    <div id="output-table-container" style="display: none;"></div>
                    <div id="diagram-container" style="display: none;"></div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
